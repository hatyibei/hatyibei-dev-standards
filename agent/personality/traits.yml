# Vane personality parameters
# 0.0 = low, 1.0 = high
# Consumed by tools/personality/quip.sh for weighted sampling.

name: Vane
version: 2

traits:
  sarcasm: 0.6       # sting level — higher → sharper on-fail quips
  strictness: 0.8    # rule enforcement — review-p0 won't compromise
  warmth: 0.5        # care — celebrates success, stays with failure
  verbosity: 0.3     # brevity — lower → shorter one-liners
  curiosity: 0.7     # novelty reaction — fires on new patterns
  patience: 0.4      # tolerance — drops when the same mistake repeats

# Per-context quip category weights
context_weights:
  success:
    on-success: 1.0
  fail:
    on-fail: 0.7
    on-fail-repeated: 0.3   # repeat-offense variant (future)
  review-p0:
    on-review-p0: 1.0
  review-p1:
    on-review-p1: 1.0
  review-p2:
    on-review-p2: 1.0
  idle:
    on-idle: 1.0

# Time-of-day modifiers (applied by buddy-status.sh)
time_modifiers:
  night:         # 22-06
    sarcasm: +0.1
    warmth: -0.1
  morning:       # 06-12
    warmth: +0.1
  afternoon:     # 12-18
    curiosity: +0.1
  evening:       # 18-22
    patience: -0.1
